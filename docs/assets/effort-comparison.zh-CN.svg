<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">一人加 Codex 与传统交付团队的工作量对比</title>
  <desc id="desc">在同样四个月周期内，源系统由一人借助 Codex 推进。传统团队基础完整重建估算需要十七到二十七名全职角色，约一千三百二十到两千一百六十人天；包含业务探索与生产治理的扩展情景需要二十五到三十八名角色，约两千到三千人天。</desc>
  <rect width="1200" height="720" rx="28" fill="#0f172a"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <text x="64" y="66" fill="#f8fafc" font-size="32" font-weight="600">一个人，约四个月，一套真实生产系统</text>
    <text x="64" y="102" fill="#94a3b8" font-size="18">同样四个月周期内，传统团队的重建工作量</text>

    <g stroke="#334155" stroke-width="1">
      <line x1="190" y1="158" x2="1110" y2="158"/>
      <line x1="190" y1="158" x2="190" y2="500"/>
      <line x1="420" y1="158" x2="420" y2="500" stroke-dasharray="5 7"/>
      <line x1="650" y1="158" x2="650" y2="500" stroke-dasharray="5 7"/>
      <line x1="880" y1="158" x2="880" y2="500" stroke-dasharray="5 7"/>
      <line x1="1110" y1="158" x2="1110" y2="500"/>
    </g>
    <g fill="#94a3b8" font-size="14" text-anchor="middle">
      <text x="190" y="145">0</text>
      <text x="420" y="145">10</text>
      <text x="650" y="145">20</text>
      <text x="880" y="145">30</text>
      <text x="1110" y="145">40 人</text>
    </g>

    <g>
      <text x="64" y="220" fill="#f8fafc" font-size="18" font-weight="600">实际完成</text>
      <text x="64" y="247" fill="#94a3b8" font-size="15">1 个人 + Codex</text>
      <circle cx="213" cy="228" r="19" fill="#a78bfa"/>
      <text x="213" y="234" fill="#0f172a" font-size="16" font-weight="700" text-anchor="middle">1</text>
      <text x="250" y="234" fill="#e2e8f0" font-size="17">约 4 个月</text>
    </g>

    <g>
      <text x="64" y="335" fill="#f8fafc" font-size="18" font-weight="600">基础完整重建</text>
      <text x="64" y="362" fill="#94a3b8" font-size="15">产品 + 研发 + 测试 + 发布运维</text>
      <rect x="581" y="311" width="230" height="48" rx="12" fill="#8b5cf6"/>
      <text x="696" y="342" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">17–27 人</text>
      <text x="826" y="342" fill="#e2e8f0" font-size="16">1,320–2,160 人天</text>
    </g>

    <g>
      <text x="64" y="450" fill="#f8fafc" font-size="18" font-weight="600">扩展重建情景</text>
      <text x="64" y="477" fill="#94a3b8" font-size="15">再含业务探索、第三方踩坑与生产治理</text>
      <rect x="765" y="426" width="299" height="48" rx="12" fill="#14b8a6"/>
      <text x="914" y="457" fill="#042f2e" font-size="18" font-weight="700" text-anchor="middle">25–38 人</text>
      <text x="748" y="446" fill="#e2e8f0" font-size="14" text-anchor="end">2,000–3,000</text>
      <text x="748" y="466" fill="#94a3b8" font-size="13" text-anchor="end">人天</text>
    </g>

    <line x1="64" y1="522" x2="1136" y2="522" stroke="#334155"/>
    <g text-anchor="middle">
      <g transform="translate(155 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">36.17 万</text>
        <text y="601" fill="#94a3b8" font-size="14">运行与测试源码</text>
      </g>
      <g transform="translate(370 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">466</text>
        <text y="601" fill="#94a3b8" font-size="14">测试文件</text>
      </g>
      <g transform="translate(585 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">1,869</text>
        <text y="601" fill="#94a3b8" font-size="14">主线提交</text>
      </g>
      <g transform="translate(800 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">145</text>
        <text y="601" fill="#94a3b8" font-size="14">数据库迁移</text>
      </g>
      <g transform="translate(1015 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">573</text>
        <text y="601" fill="#94a3b8" font-size="14">发布与修复复盘</text>
      </g>
    </g>
    <text x="64" y="657" fill="#94a3b8" font-size="14">透明重建估算：不是财务审计、固定报价，也不是 ExoCrew 已验证提速。</text>
    <text x="64" y="684" fill="#64748b" font-size="13">个人投入周期为用户自述约 4 个月；Git 首尾留痕跨度为 139 个自然日。</text>
  </g>
</svg>
