<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">One builder with Codex compared with a traditional delivery team</title>
  <desc id="desc">Over the same four-month horizon, the source system was led by one person using Codex. A baseline traditional reconstruction is estimated at 17 to 27 full-time roles, or 1,320 to 2,160 person-days. An extended scenario including discovery and production operations is estimated at 25 to 38 roles, or 2,000 to 3,000 person-days.</desc>
  <rect width="1200" height="720" rx="28" fill="#0f172a"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif">
    <text x="64" y="66" fill="#f8fafc" font-size="32" font-weight="600">One builder. Four months. A production system.</text>
    <text x="64" y="102" fill="#94a3b8" font-size="18">Traditional reconstruction capacity over the same four-month horizon</text>

    <g stroke="#334155" stroke-width="1">
      <line x1="190" y1="158" x2="1110" y2="158"/>
      <line x1="190" y1="158" x2="190" y2="500"/>
      <line x1="420" y1="158" x2="420" y2="500" stroke-dasharray="5 7"/>
      <line x1="650" y1="158" x2="650" y2="500" stroke-dasharray="5 7"/>
      <line x1="880" y1="158" x2="880" y2="500" stroke-dasharray="5 7"/>
      <line x1="1110" y1="158" x2="1110" y2="500"/>
    </g>
    <g fill="#94a3b8" font-size="14" text-anchor="middle">
      <text x="190" y="145">0</text>
      <text x="420" y="145">10</text>
      <text x="650" y="145">20</text>
      <text x="880" y="145">30</text>
      <text x="1110" y="145">40 FTE</text>
    </g>

    <g>
      <text x="64" y="220" fill="#f8fafc" font-size="18" font-weight="600">Actual</text>
      <text x="64" y="247" fill="#94a3b8" font-size="15">1 person + Codex</text>
      <circle cx="213" cy="228" r="19" fill="#a78bfa"/>
      <text x="213" y="234" fill="#0f172a" font-size="16" font-weight="700" text-anchor="middle">1</text>
      <text x="250" y="234" fill="#e2e8f0" font-size="17">about 4 months</text>
    </g>

    <g>
      <text x="64" y="335" fill="#f8fafc" font-size="18" font-weight="600">Baseline rebuild</text>
      <text x="64" y="362" fill="#94a3b8" font-size="15">full delivery scope</text>
      <rect x="581" y="311" width="230" height="48" rx="12" fill="#8b5cf6"/>
      <text x="696" y="342" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle">17–27 roles</text>
      <text x="826" y="342" fill="#e2e8f0" font-size="16">1,320–2,160 person-days</text>
    </g>

    <g>
      <text x="64" y="450" fill="#f8fafc" font-size="18" font-weight="600">Extended rebuild</text>
      <text x="64" y="477" fill="#94a3b8" font-size="15">discovery + production operations</text>
      <rect x="765" y="426" width="299" height="48" rx="12" fill="#14b8a6"/>
      <text x="914" y="457" fill="#042f2e" font-size="18" font-weight="700" text-anchor="middle">25–38 roles</text>
      <text x="748" y="446" fill="#e2e8f0" font-size="14" text-anchor="end">2,000–3,000</text>
      <text x="748" y="466" fill="#94a3b8" font-size="13" text-anchor="end">person-days</text>
    </g>

    <line x1="64" y1="522" x2="1136" y2="522" stroke="#334155"/>
    <g text-anchor="middle">
      <g transform="translate(155 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">361.7k</text>
        <text y="601" fill="#94a3b8" font-size="14">runtime + test lines</text>
      </g>
      <g transform="translate(370 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">466</text>
        <text y="601" fill="#94a3b8" font-size="14">test/spec files</text>
      </g>
      <g transform="translate(585 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">1,869</text>
        <text y="601" fill="#94a3b8" font-size="14">mainline commits</text>
      </g>
      <g transform="translate(800 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">145</text>
        <text y="601" fill="#94a3b8" font-size="14">database migrations</text>
      </g>
      <g transform="translate(1015 0)">
        <text y="574" fill="#f8fafc" font-size="23" font-weight="700">573</text>
        <text y="601" fill="#94a3b8" font-size="14">release/repair retros</text>
      </g>
    </g>
    <text x="64" y="657" fill="#94a3b8" font-size="14">Transparent reconstruction estimate — not audited payroll, a fixed quote, or a measured ExoCrew speed-up.</text>
    <text x="64" y="684" fill="#64748b" font-size="13">Founder-reported build period: about four months. Repository evidence span: 139 calendar days.</text>
  </g>
</svg>
