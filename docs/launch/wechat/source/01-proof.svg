<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">ExoCrew 的真实生产来源</title>
  <desc id="desc">真实系统包含二十五个运营入口、四百零一个 HTTP 操作、一百二十五个数据模型和一百四十五份数据库迁移。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#111b36"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="30" fill="url(#bg)"/>
  <circle cx="624" cy="324" r="284" fill="url(#glow)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <text x="64" y="78" fill="#f8fafc" font-size="34" font-weight="700" text-anchor="start">不是原型：一套正在真实运行的企业业务系统</text>
    <text x="64" y="116" fill="#9aabc2" font-size="17" font-weight="400" text-anchor="start">真实运营 · 数据治理 · 企业业务信息推送 · 持续测试与发布</text>
    <rect x="64" y="158" width="1072" height="58" rx="20" fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf"/>
    <circle cx="96" cy="187" r="10" fill="#2dd4bf"/><text x="120" y="194" fill="#f8fafc" font-size="18" font-weight="700">PRODUCTION · ACTIVE ENTERPRISE OPERATIONS</text>
    <rect x="64" y="245" width="236" height="154" rx="22" fill="#101d33" stroke="#22d3ee" stroke-opacity="0.6"/>
      <text x="92" y="326" fill="#f8fafc" font-size="46" font-weight="700">25</text>
      <text x="92" y="365" fill="#9aabc2" font-size="18">个运营入口</text>
<rect x="329" y="245" width="236" height="154" rx="22" fill="#101d33" stroke="#3b82f6" stroke-opacity="0.6"/>
      <text x="357" y="326" fill="#f8fafc" font-size="46" font-weight="700">401</text>
      <text x="357" y="365" fill="#9aabc2" font-size="18">个 HTTP 操作</text>
<rect x="594" y="245" width="236" height="154" rx="22" fill="#101d33" stroke="#2dd4bf" stroke-opacity="0.6"/>
      <text x="622" y="326" fill="#f8fafc" font-size="46" font-weight="700">125</text>
      <text x="622" y="365" fill="#9aabc2" font-size="18">个数据模型</text>
<rect x="859" y="245" width="236" height="154" rx="22" fill="#101d33" stroke="#f59e0b" stroke-opacity="0.6"/>
      <text x="887" y="326" fill="#f8fafc" font-size="46" font-weight="700">145</text>
      <text x="887" y="365" fill="#9aabc2" font-size="18">份数据库迁移</text>
    <line x1="64" y1="458" x2="1136" y2="458" stroke="#2a3b57"/>
    <g text-anchor="middle">
      <text x="276" y="526" fill="#f8fafc" font-size="30" font-weight="700">约 24.5 万行</text><text x="276" y="558" fill="#9aabc2" font-size="16">运行时代码</text>
      <text x="600" y="526" fill="#f8fafc" font-size="30" font-weight="700">约 11.6 万行</text><text x="600" y="558" fill="#9aabc2" font-size="16">测试源码</text>
      <text x="924" y="526" fill="#f8fafc" font-size="30" font-weight="700">1,869 次</text><text x="924" y="558" fill="#9aabc2" font-size="16">主线提交</text>
    </g>
    <text x="600" y="626" fill="#f8fafc" font-size="20" font-weight="700" text-anchor="middle">每一个数字，都是系统真正运行、修改、验证和治理过的痕迹。</text>
  </g>
</svg>
