<svg xmlns="http://www.w3.org/2000/svg" width="900" height="383" viewBox="0 0 900 383" role="img" aria-labelledby="title desc">
  <title id="title">ExoCrew 微信公众号封面</title>
  <desc id="desc">一个人加 Codex，四个月做出真实生产系统，现在把背后的 AI 交付团队开源了。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#111b36"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="900" height="383" rx="0" fill="url(#bg)"/>
  <circle cx="468" cy="184" r="161" fill="url(#glow)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <text x="48" y="58" fill="#8b5cf6" font-size="16" font-weight="700">EXOCREW · AI 时代的交付外骨骼</text>
    <text x="48" y="125" fill="#f8fafc" font-size="34" font-weight="700" text-anchor="start">一个人 + Codex，4 个月</text>
<text x="48" y="177" fill="#f8fafc" font-size="34" font-weight="700" text-anchor="start">我把背后的 AI 交付团队开源了</text>
    <text x="48" y="251" fill="#9aabc2" font-size="17">真实生产系统 · 五个交付角色 · 一套可安装的方法</text>
    <rect x="48" y="292" width="258" height="44" rx="22" fill="#8b5cf6"/>
    <text x="177" y="321" fill="#f8fafc" font-size="17" font-weight="700" text-anchor="middle">装上你还没有的那支团队</text>
    <circle cx="715" cy="186" r="92" fill="#13233d" stroke="#8b5cf6" stroke-width="3"/>
    <text x="715" y="179" fill="#f8fafc" font-size="30" font-weight="700" text-anchor="middle">EXO</text>
    <text x="715" y="213" fill="#9aabc2" font-size="18" text-anchor="middle">CREW</text>
    <circle cx="627" cy="75" r="31" fill="#8b5cf6" fill-opacity="0.17" stroke="#8b5cf6"/><text x="627" y="81" fill="#f8fafc" font-size="14" font-weight="700" text-anchor="middle">交付</text><line x1="627" y1="75" x2="715" y2="186" stroke="#2a3b57"/>
<circle cx="795" cy="75" r="31" fill="#22d3ee" fill-opacity="0.17" stroke="#22d3ee"/><text x="795" y="81" fill="#f8fafc" font-size="14" font-weight="700" text-anchor="middle">产品</text><line x1="795" y1="75" x2="715" y2="186" stroke="#2a3b57"/>
<circle cx="841" cy="194" r="31" fill="#3b82f6" fill-opacity="0.17" stroke="#3b82f6"/><text x="841" y="200" fill="#f8fafc" font-size="14" font-weight="700" text-anchor="middle">研发</text><line x1="841" y1="194" x2="715" y2="186" stroke="#2a3b57"/>
<circle cx="765" cy="306" r="31" fill="#2dd4bf" fill-opacity="0.17" stroke="#2dd4bf"/><text x="765" y="312" fill="#f8fafc" font-size="14" font-weight="700" text-anchor="middle">测试</text><line x1="765" y1="306" x2="715" y2="186" stroke="#2a3b57"/>
<circle cx="619" cy="300" r="31" fill="#f59e0b" fill-opacity="0.17" stroke="#f59e0b"/><text x="619" y="306" fill="#f8fafc" font-size="14" font-weight="700" text-anchor="middle">运维</text><line x1="619" y1="300" x2="715" y2="186" stroke="#2a3b57"/>
  </g>
</svg>
