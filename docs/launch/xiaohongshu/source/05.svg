<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">ExoCrew 小红书发布图 5</title>
  <desc id="desc">不必看懂，每一行代码。先盯住这 4 个答案，AI 就不容易带偏项目。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#111b36"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="900" height="1200" rx="0" fill="url(#bg)"/>
  <circle cx="468" cy="576" r="378" fill="url(#glow)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <rect x="54" y="54" width="118" height="38" rx="19" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6"/>
    <text x="113" y="80" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">05 / 06</text>
    <text x="846" y="80" fill="#9aabc2" font-size="16" text-anchor="end">小白也能判断进度</text>
    <text x="54" y="182" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">不必看懂</text>
<text x="54" y="252" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">每一行代码</text>
    <text x="54" y="334" fill="#9aabc2" font-size="22" font-weight="400" text-anchor="start">先盯住这 4 个答案，AI 就不容易带偏项目。</text>
        <rect x="54" y="476" width="378" height="178" rx="22" fill="#101d33" stroke="#8b5cf6" stroke-opacity="0.56"/>
      <text x="80" y="518" fill="#8b5cf6" font-size="15" font-weight="700">01</text>
      <text x="80" y="567" fill="#f8fafc" font-size="22" font-weight="700">到底要改什么？</text>
      <text x="80" y="608" fill="#9aabc2" font-size="16">先把目标说清楚</text>
<rect x="459" y="476" width="378" height="178" rx="22" fill="#101d33" stroke="#fb7185" stroke-opacity="0.56"/>
      <text x="485" y="518" fill="#fb7185" font-size="15" font-weight="700">02</text>
      <text x="485" y="567" fill="#f8fafc" font-size="22" font-weight="700">哪些绝对不能动？</text>
      <text x="485" y="608" fill="#9aabc2" font-size="16">锁住不可退化项</text>
<rect x="54" y="684" width="378" height="178" rx="22" fill="#101d33" stroke="#2dd4bf" stroke-opacity="0.56"/>
      <text x="80" y="726" fill="#2dd4bf" font-size="15" font-weight="700">03</text>
      <text x="80" y="775" fill="#f8fafc" font-size="22" font-weight="700">完成证据在哪里？</text>
      <text x="80" y="816" fill="#9aabc2" font-size="16">测试与浏览器验收</text>
<rect x="459" y="684" width="378" height="178" rx="22" fill="#101d33" stroke="#f59e0b" stroke-opacity="0.56"/>
      <text x="485" y="726" fill="#f59e0b" font-size="15" font-weight="700">04</text>
      <text x="485" y="775" fill="#f8fafc" font-size="22" font-weight="700">出问题怎么回来？</text>
      <text x="485" y="816" fill="#9aabc2" font-size="16">保留提交与回滚点</text>
    <rect x="112" y="930" width="676" height="80" rx="40" fill="#2dd4bf" fill-opacity="0.14" stroke="#2dd4bf"/>
    <text x="450" y="980" fill="#f8fafc" font-size="22" font-weight="700" text-anchor="middle">你负责判断 · AI 负责执行</text>
    <line x1="54" y1="1094" x2="846" y2="1094" stroke="#2a3b57"/>
    <text x="54" y="1144" fill="#f8fafc" font-size="20" font-weight="700">EXOCREW</text>
    <text x="846" y="1144" fill="#9aabc2" font-size="16" text-anchor="end">把技术过程变成可验收结果</text>
  </g>
</svg>
