<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">ExoCrew 小红书发布图 5</title>
  <desc id="desc">1 个人 + Codex，约 4 个月。传统团队完整重建同等工作面，需要多大投入？</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#111b36"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="900" height="1200" rx="0" fill="url(#bg)"/>
  <circle cx="468" cy="576" r="378" fill="url(#glow)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <rect x="54" y="54" width="118" height="38" rx="19" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6"/>
    <text x="113" y="80" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">05 / 06</text>
    <text x="846" y="80" fill="#9aabc2" font-size="16" text-anchor="end">透明重建模型</text>
    <text x="54" y="182" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">1 个人 + Codex</text>
<text x="54" y="252" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">约 4 个月</text>
    <text x="54" y="334" fill="#9aabc2" font-size="22" font-weight="400" text-anchor="start">传统团队完整重建同等工作面，需要多大投入？</text>
        <text x="54" y="510" fill="#9aabc2" font-size="18">实际推进</text>
    <rect x="54" y="540" width="72" height="70" rx="18" fill="#8b5cf6"/>
    <text x="90" y="585" fill="#f8fafc" font-size="28" font-weight="700" text-anchor="middle">1</text>
    <text x="151" y="582" fill="#f8fafc" font-size="24" font-weight="700">个人 + Codex</text>
    <text x="54" y="678" fill="#9aabc2" font-size="18">基础完整重建估算</text>
    <rect x="54" y="710" width="650" height="86" rx="22" fill="#3b82f6"/>
    <text x="379" y="763" fill="#f8fafc" font-size="30" font-weight="700" text-anchor="middle">17–27 个跨职能角色</text>
    <text x="729" y="746" fill="#f8fafc" font-size="22" font-weight="700">1,320–</text>
    <text x="729" y="775" fill="#f8fafc" font-size="22" font-weight="700">2,160 人天</text>
    <g text-anchor="middle">
      <text x="176" y="895" fill="#f8fafc" font-size="32" font-weight="700">36.17 万</text><text x="176" y="928" fill="#9aabc2" font-size="16">行运行与测试源码</text>
      <text x="450" y="895" fill="#f8fafc" font-size="32" font-weight="700">466</text><text x="450" y="928" fill="#9aabc2" font-size="16">个测试文件</text>
      <text x="724" y="895" fill="#f8fafc" font-size="32" font-weight="700">1,869</text><text x="724" y="928" fill="#9aabc2" font-size="16">次主线提交</text>
    </g>
    <text x="54" y="1017" fill="#9aabc2" font-size="15">传统团队重建估算，不是 ExoCrew 安装后的实测提速。</text>
    <line x1="54" y1="1094" x2="846" y2="1094" stroke="#2a3b57"/>
    <text x="54" y="1144" fill="#f8fafc" font-size="20" font-weight="700">EXOCREW</text>
    <text x="846" y="1144" fill="#9aabc2" font-size="16" text-anchor="end">完整公式已公开</text>
  </g>
</svg>
