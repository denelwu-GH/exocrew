<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">ExoCrew 小红书发布图 1</title>
  <desc id="desc">AI Agent、Skill、，Harness、Spec、CI/CD，到底有什么区别？。别再把不同层级的工具放进同一个排行榜</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0b1830"/>
      <stop offset="1" stop-color="#111b36"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="900" height="1200" rx="0" fill="url(#bg)"/>
  <circle cx="468" cy="576" r="378" fill="url(#glow)"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif">
    <rect x="54" y="54" width="118" height="38" rx="19" fill="#8b5cf6" fill-opacity="0.18" stroke="#8b5cf6"/>
    <text x="113" y="80" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">01 / 03</text>
    <text x="846" y="80" fill="#9aabc2" font-size="16" text-anchor="end">AI 开发生态说明书</text>
    <text x="54" y="182" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">AI Agent、Skill、</text>
<text x="54" y="252" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">Harness、Spec、CI/CD</text>
<text x="54" y="322" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">到底有什么区别？</text>
    <text x="54" y="404" fill="#9aabc2" font-size="22" font-weight="400" text-anchor="start">别再把不同层级的工具放进同一个排行榜</text>
    <rect x="72" y="430" width="756" height="98" rx="22" fill="#64748b" fill-opacity="0.11" stroke="#64748b" stroke-width="1.5"/>
      <circle cx="122" cy="479" r="25" fill="#64748b" fill-opacity="0.22" stroke="#64748b"/>
      <text x="122" y="486" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">01</text>
      <text x="168" y="472" fill="#f8fafc" font-size="22" font-weight="700">基础模型</text>
      <text x="168" y="502" fill="#9aabc2" font-size="16">提供推理与生成</text>
<rect x="72" y="556" width="756" height="98" rx="22" fill="#22d3ee" fill-opacity="0.11" stroke="#22d3ee" stroke-width="1.5"/>
      <circle cx="122" cy="605" r="25" fill="#22d3ee" fill-opacity="0.22" stroke="#22d3ee"/>
      <text x="122" y="612" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">02</text>
      <text x="168" y="598" fill="#f8fafc" font-size="22" font-weight="700">AI 编程代理</text>
      <text x="168" y="628" fill="#9aabc2" font-size="16">Codex · Claude Code · Cursor</text>
<rect x="72" y="682" width="756" height="98" rx="22" fill="#3b82f6" fill-opacity="0.11" stroke="#3b82f6" stroke-width="1.5"/>
      <circle cx="122" cy="731" r="25" fill="#3b82f6" fill-opacity="0.22" stroke="#3b82f6"/>
      <text x="122" y="738" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">03</text>
      <text x="168" y="724" fill="#f8fafc" font-size="22" font-weight="700">Skills / Rules / MCP</text>
      <text x="168" y="754" fill="#9aabc2" font-size="16">提供上下文、规则与工具</text>
<rect x="72" y="808" width="756" height="98" rx="22" fill="#8b5cf6" fill-opacity="0.22" stroke="#8b5cf6" stroke-width="3"/>
      <circle cx="122" cy="857" r="25" fill="#8b5cf6" fill-opacity="0.22" stroke="#8b5cf6"/>
      <text x="122" y="864" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">04</text>
      <text x="168" y="850" fill="#f8fafc" font-size="22" font-weight="700">ExoCrew</text>
      <text x="168" y="880" fill="#9aabc2" font-size="16">约束产品、工程、现代化、测试与运维交付</text>
<rect x="72" y="934" width="756" height="98" rx="22" fill="#2dd4bf" fill-opacity="0.11" stroke="#2dd4bf" stroke-width="1.5"/>
      <circle cx="122" cy="983" r="25" fill="#2dd4bf" fill-opacity="0.22" stroke="#2dd4bf"/>
      <text x="122" y="990" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">05</text>
      <text x="168" y="976" fill="#f8fafc" font-size="22" font-weight="700">CI/CD 平台</text>
      <text x="168" y="1006" fill="#9aabc2" font-size="16">执行构建、审批、部署与观测</text>
    <line x1="54" y1="1094" x2="846" y2="1094" stroke="#2a3b57"/>
    <text x="54" y="1144" fill="#f8fafc" font-size="20" font-weight="700">EXOCREW</text>
    <text x="846" y="1144" fill="#9aabc2" font-size="16" text-anchor="end">ExoCrew · Production Delivery Harness</text>
