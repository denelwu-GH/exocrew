    <path d="M450 554 L450 615" stroke="#2a3b57" stroke-width="4"/><path d="M438 602 L450 616 L462 602" fill="none" stroke="#8b5cf6" stroke-width="3"/>
    <rect x="54" y="618" width="792" height="240" rx="28" fill="#8b5cf6" fill-opacity="0.20" stroke="#8b5cf6" stroke-width="3" filter="url(#shadow)"/>
    <text x="450" y="674" fill="#f8fafc" font-size="29" font-weight="700" text-anchor="middle">EXOCREW · 生产交付 HARNESS</text>
    <circle cx="164" cy="748" r="48" fill="#22d3ee" fill-opacity="0.16" stroke="#22d3ee"/><text x="164" y="755" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">产品边界</text>
<circle cx="307" cy="748" r="48" fill="#3b82f6" fill-opacity="0.16" stroke="#3b82f6"/><text x="307" y="755" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">工程门禁</text>
<circle cx="450" cy="748" r="48" fill="#2dd4bf" fill-opacity="0.16" stroke="#2dd4bf"/><text x="450" y="755" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">测试证据</text>
<circle cx="593" cy="748" r="48" fill="#f59e0b" fill-opacity="0.16" stroke="#f59e0b"/><text x="593" y="755" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">安全运维</text>
<circle cx="736" cy="748" r="48" fill="#8b5cf6" fill-opacity="0.16" stroke="#8b5cf6"/><text x="736" y="755" fill="#f8fafc" font-size="16" font-weight="700" text-anchor="middle">交付收口</text>
    <text x="450" y="826" fill="#9aabc2" font-size="16" text-anchor="middle">Codex 原生安装 · 五个可执行 Skills · 从真实生产交付提炼</text>
