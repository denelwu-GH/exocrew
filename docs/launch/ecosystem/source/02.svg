<text x="54" y="252" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">ExoCrew 负责</text>
<text x="54" y="322" fill="#f8fafc" font-size="54" font-weight="700" text-anchor="start">把事情真正交付</text>
    <text x="54" y="404" fill="#9aabc2" font-size="22" font-weight="400" text-anchor="start">不是替代 Codex，而是给它装上完整交付纪律</text>
        <rect x="74" y="448" width="752" height="106" rx="24" fill="#22d3ee" fill-opacity="0.12" stroke="#22d3ee"/>
